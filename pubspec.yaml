name: vivid_canvas
description: "A new Flutter project."

 
version: 1.0.0+1

environment:
  sdk: ^3.8.1
 
dependencies:
  flutter:
    sdk: flutter

 # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Real-time & Auth
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0

  # UI & Icons
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.0.3
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
 
  flutter_lints: ^5.0.0
 
flutter:
 
  uses-material-design: true

